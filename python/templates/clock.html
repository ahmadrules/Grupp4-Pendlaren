<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <style>
        .pendlar-clock-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .pendlar-clock-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            padding: 0.5rem 1.2rem;
            border-radius: 1rem;
        }

        .pendlar-clock {
            font-family: 'Courier New', 'Monaco', 'Fira Code', monospace;
            font-size: 1.6rem;
            font-weight: bold;
            color: #1ED760;
            letter-spacing: 3px;
            line-height: 1.3;
        }

        .pendlar-date {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 0.7rem;
            color: white;
            letter-spacing: 0.5px;
            text-align: right;
            margin-top: 4px;
        }

    </style>
</head>
<body>

<div class="pendlar-clock-wrapper">
    <div class="pendlar-clock-container">
        <div class="pendlar-clock" id="pendlarLiveClock">
            --:--:--
        </div>
        <div class="pendlar-date" id="pendlarLiveDate">
            -- -- ---
        </div>
    </div>
</div>

<script>
    (function() {
        'use strict';

        const weekdays = ['Söndag', 'Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag', 'Lördag'];
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Maj', 'Jun', 'Jul', 'Aug', 'Sep', 'Okt', 'Nov', 'Dec'];

        function pad(num) {
            return String(num).padStart(2, '0');
        }

        function updateClock() {
            const now = new Date();

            //tid
            const hours = pad(now.getHours());
            const minutes = pad(now.getMinutes());
            const seconds = pad(now.getSeconds());

            //datum
            const weekday = weekdays[now.getDay()];
            const day = now.getDate();
            const month = months[now.getMonth()];
            const year = now.getFullYear();


            const clockElement = document.getElementById('pendlarLiveClock');
            const dateElement = document.getElementById('pendlarLiveDate');

            if (clockElement) {
                clockElement.textContent = `${hours}:${minutes}:${seconds}`;
            }

            if (dateElement) {
                dateElement.textContent = `${weekday} ${day} ${month} ${year}`;
            }
        }

        updateClock();
        setInterval(updateClock, 1000);
    })();
</script>

</body>
</html>
